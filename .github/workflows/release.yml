name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  releases: write

jobs:
  build-and-upload:
    name: Build and Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      BINDGEN_EXTRA_CLANG_ARGS: --target=${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: mm-dlp-cli
            asset_name: mm-dlp-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: mm-dlp-cli
            asset_name: mm-dlp-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: mm-dlp-cli.exe
            asset_name: mm-dlp-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for upload (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.asset_name }}

      - name: Rename binary for upload (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" -NewName "${{ matrix.asset_name }}"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
